<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="google-site-verification" content="xV_rs4g3gSH67Uc_jM6JfZwPkmrdlAZZK9E6_i7RkMY" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LandCare – Loading</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #083b15;
    --green-mid: #0b5d1e;
    --green-light: #e8f5e9;
    --red: #D63557;
    --black: #111827;
    --gray: #9ca3af;
    --border: #e5e7eb;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
  }

  /* ── Background decorative rings ── */
  .bg-rings {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 0;
  }
  .bg-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--green-light);
    animation: bgExpand 4s ease-in-out infinite;
  }
  .bg-ring:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; }
  .bg-ring:nth-child(2) { width: 460px; height: 460px; animation-delay: 0.6s; }
  .bg-ring:nth-child(3) { width: 620px; height: 620px; animation-delay: 1.2s; }
  @keyframes bgExpand {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 0.2; transform: scale(1.04); }
  }

  /* ── Corner accents ── */
  .corner {
    position: fixed;
    width: 80px; height: 80px;
    z-index: 0;
    opacity: 0.12;
  }
  .corner-tl { top: 32px; left: 32px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); border-radius: 4px 0 0 0; }
  .corner-tr { top: 32px; right: 32px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); border-radius: 0 4px 0 0; }
  .corner-bl { bottom: 32px; left: 32px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); border-radius: 0 0 0 4px; }
  .corner-br { bottom: 32px; right: 32px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); border-radius: 0 0 4px 0; }

  /* ── Main stage ── */
  .stage {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Logo orbit system ── */
  .logo-system {
    position: relative;
    width: 210px;
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Spinning outer orbit ring */
  .orbit-outer {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top: 2px solid var(--green);
    border-right: 2px solid var(--green);
    animation: spinCW 1.2s linear infinite;
  }
  .orbit-inner {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    border: 1.5px dashed #c8e6c9;
    animation: spinCCW 3s linear infinite;
  }

  @keyframes spinCW  { to { transform: rotate(360deg); } }
  @keyframes spinCCW { to { transform: rotate(-360deg); } }

  .dot-green {
    position: absolute;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--green);
    top: 3px; left: 50%;
    margin-left: -5.5px;
    transform-origin: 5.5px 102px;
    animation: spinCW 1.2s linear infinite;
    box-shadow: 0 0 0 3px rgba(8,59,21,0.15);
  }
  .dot-red {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    top: 18px; left: 50%;
    margin-left: -4px;
    transform-origin: 4px 87px;
    animation: spinCW 2s linear infinite;
    box-shadow: 0 0 0 3px rgba(214,53,87,0.15);
  }

  /* Logo card */
  .logo-card {
    position: relative;
    z-index: 5;
    width: 130px; height: 130px;
    background: #fff;
    border-radius: 28px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(8,59,21,0.10);
    animation: logoSpin 2.5s ease-in-out infinite, logoFloat 2.5s ease-in-out infinite;
    overflow: hidden;
  }

  @keyframes logoSpin {
    0%   { transform: rotate(0deg); }
    25%  { transform: rotate(360deg); }
    100% { transform: rotate(360deg); }
  }
  /* separate float */
  @keyframes logoFloat {
    0%, 100% { box-shadow: 0 8px 32px rgba(8,59,21,0.10); }
    50%       { box-shadow: 0 18px 40px rgba(8,59,21,0.18); }
  }

  .logo-card img {
    width: 100px; height: 100px;
    object-fit: contain;
  }

  /* ── Brand text ── */
  .brand-block {
    text-align: center;
    margin-top: 30px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--black);
    line-height: 1;
  }

  .brand-sub-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }
  .brand-sub-line {
    width: 28px;
    height: 1px;
    background: var(--green);
    opacity: 0.5;
  }
  .brand-sub {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 5px;
    color: var(--green);
    text-transform: uppercase;
  }

  .tagline {
    font-size: 11px;
    color: var(--gray);
    margin-top: 6px;
    letter-spacing: 1.5px;
    font-weight: 300;
  }

  /* ── Thin progress line ── */
  .progress-wrap {
    width: 180px;
    margin-top: 28px;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.6s forwards;
  }
  .progress-track {
    width: 100%;
    height: 2px;
    background: var(--green-light);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0;
    background: var(--green);
    border-radius: 99px;
    animation: fillBar 2.2s cubic-bezier(0.4,0,0.2,1) 0.3s forwards;
  }
  @keyframes fillBar {
    0%   { width: 0%; }
    60%  { width: 75%; }
    100% { width: 100%; }
  }

  /* ── Tagline bottom ── */
  .footer-tag {
    position: fixed;
    bottom: 28px;
    font-size: 10px;
    letter-spacing: 3px;
    color: #d1d5db;
    text-transform: uppercase;
    font-weight: 400;
    z-index: 2;
    opacity: 0;
    animation: fadeUp 0.7s ease 1.2s forwards;
  }
</style>
</head>
<body>

  <!-- Background rings -->
  <div class="bg-rings">
    <div class="bg-ring"></div>
    <div class="bg-ring"></div>
    <div class="bg-ring"></div>
  </div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Main stage -->
  <div class="stage">

    <!-- Orbit + Logo -->
    <div class="logo-system">
      <div class="orbit-outer"></div>
      <div class="orbit-inner"></div>
      <div class="dot-green"></div>
      <div class="dot-red"></div>

      <div class="logo-card">
        <img src="logo.png" alt="Saketh Land Care Logo"/>
      </div>
    </div>

    <!-- Brand text -->
    <div class="brand-block">
      <div class="brand-name">SAKETH</div>
      <div class="brand-sub-wrap">
        <div class="brand-sub-line"></div>
        <div class="brand-sub">Land Care</div>
        <div class="brand-sub-line"></div>
      </div>
      <div class="tagline">Your Land. Our Responsibility.</div>
    </div>

    <!-- Progress slim line -->
    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer-tag">Tirupati · Andhra Pradesh</div>

  <script>
    setTimeout(() => { window.location.href = 'main.html'; }, 2800);
  </script>
</body>
</html>
